# U Tygra - AIAD Quality Gates Pipeline
# Validates content, build, HTML, SEO, accessibility, performance, security, and links
# Deployment is handled by pages.yml - this pipeline is quality-only

name: AIAD Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ZOLA_VERSION: "0.22.1"

jobs:
  # Phase 1: Content Validation
  content-validation:
    name: "Content Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate content structure
        run: |
          echo "::group::Content Structure Analysis"
          if [ ! -d "content" ]; then
            echo "::error::Content directory not found"
            exit 1
          fi

          CONTENT_COUNT=$(find content -name "*.md" -type f | wc -l)
          echo "Content files found: ${CONTENT_COUNT}"

          ERRORS=0
          while IFS= read -r file; do
            if ! head -n 1 "$file" | grep -q "^+++\|^---"; then
              echo "::warning file=${file}::Missing front matter"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find content -name "*.md" -type f)

          if [ $ERRORS -gt 0 ]; then
            echo "::warning::${ERRORS} files with front matter issues"
          else
            echo "All content files have valid front matter"
          fi
          echo "::endgroup::"

      - name: Check Czech localization
        run: |
          echo "::group::Czech Localization Check"
          if grep -q 'default_language = "cs"' zola.toml; then
            echo "Czech language configured correctly"
          else
            echo "::warning::Default language is not Czech (cs)"
          fi

          for field in business_name address phone_bar opening_hours; do
            if grep -q "${field}" zola.toml; then
              echo "  ${field}: present"
            else
              echo "::warning::Missing business field: ${field}"
            fi
          done
          echo "::endgroup::"

  # Phase 2: Build
  build:
    name: "Build Site"
    runs-on: ubuntu-latest
    needs: content-validation
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@${{ env.ZOLA_VERSION }}

      - name: Build site
        run: |
          echo "::group::Zola Build"
          START_TIME=$(date +%s)
          zola build 2>&1 | tee build.log
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          echo "Build completed in ${BUILD_TIME} seconds"
          if [ $BUILD_TIME -gt 30 ]; then
            echo "::warning::Build time (${BUILD_TIME}s) exceeds 30s target"
          fi
          echo "::endgroup::"

      - name: Analyze build output
        run: |
          echo "::group::Build Analysis"
          if [ ! -d "public" ]; then
            echo "::error::Build failed - public directory not created"
            exit 1
          fi

          BUILD_SIZE=$(du -sh public | cut -f1)
          FILE_COUNT=$(find public -type f | wc -l)
          HTML_COUNT=$(find public -name "*.html" -type f | wc -l)
          echo "Build Size: ${BUILD_SIZE} | Files: ${FILE_COUNT} | HTML: ${HTML_COUNT}"

          SIZE_BYTES=$(du -sb public | cut -f1)
          if [ $SIZE_BYTES -gt 52428800 ]; then
            echo "::warning::Build size exceeds 50MB limit"
          fi
          echo "::endgroup::"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: public/
          retention-days: 3

  # Phase 3: Quality Gates (parallel)
  html-validation:
    name: "HTML Validation"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: public/

      - name: Validate HTML structure
        run: |
          echo "::group::HTML Validation"
          ERRORS=0
          for file in $(find public -name "*.html" -type f); do
            if ! grep -qi '<!doctype html>' "$file" 2>/dev/null; then
              echo "::warning file=${file}::Missing DOCTYPE declaration"
              ERRORS=$((ERRORS + 1))
            fi
            if ! grep -q 'lang=' "$file" 2>/dev/null; then
              echo "::warning file=${file}::Missing lang attribute"
              ERRORS=$((ERRORS + 1))
            fi
            if ! grep -q '<meta charset' "$file" 2>/dev/null; then
              if ! grep -q '<meta http-equiv="Content-Type"' "$file" 2>/dev/null; then
                echo "::warning file=${file}::Missing charset declaration"
                ERRORS=$((ERRORS + 1))
              fi
            fi
            if ! grep -q '<meta name="viewport"' "$file" 2>/dev/null; then
              echo "::warning file=${file}::Missing viewport meta tag"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo "HTML validation complete. Issues: ${ERRORS}"
          echo "::endgroup::"

  seo-validation:
    name: "SEO Validation"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: public/

      - name: Validate SEO metadata
        run: |
          echo "::group::SEO Validation"
          WARNINGS=0
          for file in $(find public -name "*.html" -type f); do
            if ! grep -q '<title>' "$file" 2>/dev/null; then
              echo "::warning file=${file}::Missing title tag"
              WARNINGS=$((WARNINGS + 1))
            fi
            if ! grep -q 'meta name="description"' "$file" 2>/dev/null; then
              echo "::warning file=${file}::Missing meta description"
              WARNINGS=$((WARNINGS + 1))
            fi
            BASENAME=$(basename "$file")
            if [ "$BASENAME" = "index.html" ]; then
              for tag in og:title og:description og:type; do
                TAG_ESCAPED=$(echo "$tag" | sed 's/:/\\:/g')
                if ! grep -q "property=\"${tag}\"" "$file" 2>/dev/null; then
                  echo "::warning file=${file}::Missing ${tag}"
                  WARNINGS=$((WARNINGS + 1))
                fi
              done
            fi
          done
          echo "SEO validation complete. Warnings: ${WARNINGS}"
          echo "::endgroup::"

  accessibility-check:
    name: "Accessibility Check"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: public/

      - name: Check accessibility basics
        run: |
          echo "::group::Accessibility Check"
          ISSUES=0
          for file in $(find public -name "*.html" -type f); do
            if ! grep -q 'lang="cs"' "$file" 2>/dev/null && ! grep -q 'lang="en"' "$file" 2>/dev/null; then
              echo "::warning file=${file}::Missing or invalid lang attribute"
              ISSUES=$((ISSUES + 1))
            fi
            IMG_COUNT=$(grep -c '<img' "$file" 2>/dev/null || echo 0)
            ALT_COUNT=$(grep -c 'alt=' "$file" 2>/dev/null || echo 0)
            if [ "$IMG_COUNT" -gt 0 ] && [ "$ALT_COUNT" -lt "$IMG_COUNT" ]; then
              echo "::warning file=${file}::$((IMG_COUNT - ALT_COUNT)) image(s) missing alt text"
              ISSUES=$((ISSUES + 1))
            fi
          done
          echo "Accessibility check complete. Issues: ${ISSUES}"
          echo "::endgroup::"

  link-integrity:
    name: "Link Integrity Check"
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@${{ env.ZOLA_VERSION }}

      - name: Build site for link checking
        run: zola build

      - name: Make test-links executable
        run: chmod +x .aiad/commands/test-links

      - name: Run internal path checks
        run: |
          echo "::group::Internal Path Verification"
          .aiad/commands/test-links --internal-only --verbose || true
          echo "::endgroup::"

      - name: Run data endpoint validation
        run: |
          echo "::group::Data Endpoint Validation"
          .aiad/commands/test-links --data-only --verbose || true
          echo "::endgroup::"

      - name: Run external URL checks
        run: |
          echo "::group::External URL Verification"
          .aiad/commands/test-links --external-only --verbose --timeout 15 || true
          echo "::endgroup::"
        continue-on-error: true

  # Phase 4: Quality Gate Summary
  quality-summary:
    name: "Quality Summary"
    runs-on: ubuntu-latest
    needs:
      - content-validation
      - build
      - html-validation
      - seo-validation
      - accessibility-check
      - link-integrity
    if: always()
    steps:
      - name: Quality gate evaluation
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RESULT_CONTENT: ${{ needs.content-validation.result }}
          RESULT_BUILD: ${{ needs.build.result }}
          RESULT_HTML: ${{ needs.html-validation.result }}
          RESULT_SEO: ${{ needs.seo-validation.result }}
          RESULT_A11Y: ${{ needs.accessibility-check.result }}
          RESULT_LINKS: ${{ needs.link-integrity.result }}
        run: |
          echo "======================================"
          echo "  U Tygra - Quality Gate Report"
          echo "======================================"
          echo ""
          echo "Branch: ${BRANCH_NAME}"
          echo "Commit: ${COMMIT_SHA}"
          echo ""
          echo "Gate Results:"
          echo "  Content Validation: ${RESULT_CONTENT}"
          echo "  Build:              ${RESULT_BUILD}"
          echo "  HTML Validation:    ${RESULT_HTML}"
          echo "  SEO Validation:     ${RESULT_SEO}"
          echo "  Accessibility:      ${RESULT_A11Y}"
          echo "  Link Integrity:     ${RESULT_LINKS}"
          echo ""

          FAILED=0
          for result in "${RESULT_CONTENT}" "${RESULT_BUILD}" "${RESULT_HTML}" "${RESULT_SEO}" "${RESULT_A11Y}" "${RESULT_LINKS}"; do
            if [ "$result" = "failure" ]; then
              FAILED=$((FAILED + 1))
            fi
          done

          if [ $FAILED -eq 0 ]; then
            echo "Overall: PASSED"
          else
            echo "::error::${FAILED} quality gate(s) failed"
          fi
          echo "======================================"
