<script>
// ES5-only kiosk for old Smart TV browsers (JVC, Samsung, LG)
// No const/let, no arrow functions, no template literals, no async/await
// No Alpine.js, no modules, no classes - pure vanilla ES5

var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSeZjP4HadboLuS8v4KVobNqsKtjaBpBJ8oCuPCC-OjfkCtCWA8N_asuxkedh7QSGhsrXU0JU_bV_Rn/pub?gid=1804527038&single=true&output=csv';
var REFRESH_MS = 90000;

function esc(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function parseCSVLine(line) {
  var cells = [];
  var current = '';
  var inQuotes = false;
  var i, ch;
  for (i = 0; i < line.length; i++) {
    ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (i + 1 < line.length && line[i + 1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = false;
        }
      } else {
        current += ch;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
      } else if (ch === ',') {
        cells.push(current.trim());
        current = '';
      } else {
        current += ch;
      }
    }
  }
  cells.push(current.trim());
  return cells;
}

function normalizeKey(h) {
  var k = h.toLowerCase().trim();
  if (k.indexOf('pivovar') !== -1) return 'pivovar';
  if (k.indexOf('název') !== -1 || k.indexOf('name') !== -1) return 'nazev';
  if (k.indexOf('styl') !== -1 || k.indexOf('style') !== -1) return 'styl';
  if (k.indexOf('alk') !== -1 || k === '%') return 'abv';
  if (k.indexOf('ibu') !== -1) return 'ibu';
  if (k.indexOf('cena') !== -1 || k.indexOf('price') !== -1) return 'cena';
  return k;
}

function loadBeers() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', CSV_URL, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;

    if (xhr.status !== 200) {
      document.getElementById('loading').textContent = 'Nepodařilo se načíst nabídku.';
      // offline
      return;
    }

    var csv = xhr.responseText;
    var lines = csv.split('\n');
    var nonEmpty = [];
    var i;
    for (i = 0; i < lines.length; i++) {
      if (lines[i].trim()) nonEmpty.push(lines[i]);
    }

    if (nonEmpty.length === 0) return;

    // Announcement from row 1, columns C-F
    var firstRow = parseCSVLine(nonEmpty[0]);
    var ann = [];
    var a;
    for (a = 2; a <= 5; a++) {
      if (firstRow[a]) ann.push(firstRow[a]);
    }
    var announcement = ann.join(' ');

    var annEl = document.getElementById('announcement');
    if (announcement) {
      annEl.textContent = announcement;
      annEl.style.display = '';
    } else {
      annEl.style.display = 'none';
    }

    // Find header row
    var headerIdx = -1;
    var h;
    for (h = 0; h < nonEmpty.length; h++) {
      var lower = nonEmpty[h].toLowerCase();
      if (lower.indexOf('pivo') !== -1 || lower.indexOf('pivovar') !== -1 || lower.indexOf('název') !== -1) {
        headerIdx = h;
        break;
      }
    }

    if (headerIdx < 0) {
      document.getElementById('loading').textContent = 'Žádná piva na čepu.';
      return;
    }

    var rawHeaders = parseCSVLine(nonEmpty[headerIdx]);
    var headers = [];
    var hi;
    for (hi = 0; hi < rawHeaders.length; hi++) {
      headers.push(normalizeKey(rawHeaders[hi]));
    }

    // Parse beers (deduplicate by brewery+name)
    var beers = [];
    var seen = {};
    var bi, cells, brewery, name, breweryIdx, nameIdx, ci, key, beer, ki;
    for (bi = headerIdx + 1; bi < nonEmpty.length && beers.length < 12; bi++) {
      cells = parseCSVLine(nonEmpty[bi]);
      breweryIdx = -1;
      nameIdx = -1;
      for (ci = 0; ci < headers.length; ci++) {
        if (headers[ci] === 'pivovar') breweryIdx = ci;
        if (headers[ci] === 'nazev') nameIdx = ci;
      }
      brewery = breweryIdx >= 0 ? (cells[breweryIdx] || '').trim() : '';
      name = nameIdx >= 0 ? (cells[nameIdx] || '').trim() : '';
      if (!brewery && !name) continue;

      key = brewery.toLowerCase() + '|' + name.toLowerCase();
      if (seen[key]) continue;
      seen[key] = true;

      beer = {};
      for (ki = 0; ki < headers.length; ki++) {
        if (headers[ki]) beer[headers[ki]] = (cells[ki] || '').trim();
      }
      beers.push(beer);
    }

    // Build table using DOM (no innerHTML with untrusted content)
    var container = document.getElementById('beer-container');
    var oldTable = document.getElementById('beer-table');
    if (oldTable) container.removeChild(oldTable);

    var table = document.createElement('table');
    table.id = 'beer-table';

    // Column widths for even distribution
    var colgroup = document.createElement('colgroup');
    var colClasses = ['col-num', 'col-name', 'col-brewery', 'col-style', 'col-abv', 'col-ibu', 'col-price'];
    var ci2;
    for (ci2 = 0; ci2 < colClasses.length; ci2++) {
      var col = document.createElement('col');
      col.className = colClasses[ci2];
      colgroup.appendChild(col);
    }
    table.appendChild(colgroup);

    var thead = document.createElement('thead');
    var headerRow = document.createElement('tr');
    var thNames = ['#', 'Pivo', 'Pivovar', 'Styl', 'Alk.', 'IBU', 'Cena'];
    var ti;
    for (ti = 0; ti < thNames.length; ti++) {
      var th = document.createElement('th');
      th.textContent = thNames[ti];
      if (ti === 0) {
        th.style.cursor = 'pointer';
        th.onclick = function() {
          if (window.kiosk && window.kiosk.showTerm) window.kiosk.showTerm();
        };
      }
      headerRow.appendChild(th);
    }
    thead.appendChild(headerRow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    var ri, b, tr, tdName, tdBrewery, tdStyle, tdAbv, tdPrice;
    for (ri = 0; ri < beers.length; ri++) {
      b = beers[ri];
      tr = document.createElement('tr');

      var tdNum = document.createElement('td');
      tdNum.className = 'td-num';
      tdNum.textContent = (ri + 1) + '.';
      tr.appendChild(tdNum);

      tdName = document.createElement('td');
      tdName.className = 'td-name';
      var fullName = b.nazev || '';
      // Split long names into 2 lines at the best word boundary
      if (fullName.length > 14) {
        var words = fullName.split(' ');
        var line1 = '';
        var line2 = '';
        var mid = Math.ceil(words.length / 2);
        for (var wi = 0; wi < words.length; wi++) {
          if (wi < mid) {
            line1 += (line1 ? ' ' : '') + words[wi];
          } else {
            line2 += (line2 ? ' ' : '') + words[wi];
          }
        }
        if (line2) {
          var span1 = document.createElement('span');
          span1.textContent = line1;
          var span2 = document.createElement('span');
          span2.className = 'name-line2';
          span2.textContent = line2;
          tdName.appendChild(span1);
          tdName.appendChild(span2);
        } else {
          tdName.textContent = fullName;
        }
      } else {
        tdName.textContent = fullName;
      }
      tr.appendChild(tdName);

      tdBrewery = document.createElement('td');
      tdBrewery.className = 'td-brewery';
      tdBrewery.textContent = b.pivovar || '';
      tr.appendChild(tdBrewery);

      tdStyle = document.createElement('td');
      tdStyle.className = 'td-style';
      tdStyle.textContent = b.styl || '';
      tr.appendChild(tdStyle);

      tdAbv = document.createElement('td');
      tdAbv.className = 'td-abv';
      tdAbv.textContent = b.abv || '';
      tr.appendChild(tdAbv);

      var tdIbu = document.createElement('td');
      tdIbu.className = 'td-ibu';
      tdIbu.textContent = b.ibu || '—';
      tr.appendChild(tdIbu);

      tdPrice = document.createElement('td');
      tdPrice.className = 'td-price';
      if (b.cena && b.cena.indexOf('/') !== -1) {
        // Split "57 / 37" into big price + smaller small price
        var priceParts = b.cena.split('/');
        var bigSpan = document.createElement('span');
        bigSpan.textContent = priceParts[0].trim();
        var sep = document.createElement('span');
        sep.className = 'price-sep';
        sep.textContent = ' / ';
        var smallSpan = document.createElement('span');
        smallSpan.className = 'price-small';
        smallSpan.textContent = priceParts[1].trim();
        var unit = document.createElement('span');
        unit.className = 'price-unit';
        unit.textContent = ' Kč';
        tdPrice.appendChild(bigSpan);
        tdPrice.appendChild(sep);
        tdPrice.appendChild(smallSpan);
        tdPrice.appendChild(unit);
      } else if (b.cena) {
        tdPrice.textContent = b.cena + ' Kč';
      }
      tr.appendChild(tdPrice);

      tbody.appendChild(tr);
    }
    table.appendChild(tbody);

    container.appendChild(table);
    document.getElementById('loading').style.display = 'none';
    // loaded

    // Fit rows to fill entire screen height
    fitToScreen(beers.length);
  };
  xhr.send();
}

function fitToScreen(beerCount) {
  // Calculate available height for table body
  var announcement = document.getElementById('announcement');
  var thead = document.querySelector('thead');
  var tableWrap = document.querySelector('.table-wrap');

  // Calculate row height from actual available space
  var tickerEl2 = document.getElementById('ticker-table');
  var announcementEl = document.getElementById('announcement');
  var usedH = 0;
  if (announcementEl && announcementEl.style.display !== 'none') usedH += announcementEl.offsetHeight;
  if (thead) usedH += thead.offsetHeight;
  if (tickerEl2) usedH += tickerEl2.offsetHeight;
  var availableHeight = window.innerHeight - usedH - 2;
  if (beerCount > 0 && availableHeight > 0) {
    var rowHeight = availableHeight / beerCount;
    var rows = document.querySelectorAll('#beer-table tbody tr');
    var i;
    var rh = Math.floor(rowHeight);
    for (i = 0; i < rows.length; i++) {
      rows[i].style.height = rh + 'px';
    }

    // Scale ALL font sizes based on row height
    var nameSize = Math.min(Math.max(rowHeight * 0.30, 16), 44);
    var brewerySize = Math.min(Math.max(rowHeight * 0.24, 14), 36);
    var styleSize = Math.min(Math.max(rowHeight * 0.20, 12), 28);
    var abvSize = Math.min(Math.max(rowHeight * 0.22, 12), 30);
    var priceSize = Math.min(Math.max(rowHeight * 0.32, 18), 48);
    var numSize = Math.min(Math.max(rowHeight * 0.30, 16), 44);

    var setSize = function(selector, size) {
      var els = document.querySelectorAll(selector);
      for (var j = 0; j < els.length; j++) {
        els[j].style.fontSize = size + 'px';
      }
    };

    setSize('.td-num', numSize);
    setSize('.td-name', nameSize);
    setSize('.td-brewery', brewerySize);
    setSize('.td-style', styleSize);
    setSize('.td-abv', abvSize);
    setSize('.td-ibu', abvSize);
    setSize('.td-price', priceSize);

    // Scale header too
    var ths = document.querySelectorAll('thead th');
    var thSize = Math.min(Math.max(rowHeight * 0.15, 10), 20);
    for (i = 0; i < ths.length; i++) {
      ths[i].style.fontSize = thSize + 'px';
    }

  }
}

// ES5 fade helpers (no CSS transitions — TV compatible)
function fadeIn(el, duration, callback) {
  el.style.display = 'block';
  el.style.opacity = '0';
  var start = null;
  function step(ts) {
    if (!start) start = ts;
    var progress = Math.min((ts - start) / duration, 1);
    el.style.opacity = String(progress);
    el.style.filter = 'alpha(opacity=' + Math.round(progress * 100) + ')';
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      if (callback) callback();
    }
  }
  requestAnimationFrame(step);
}

function fadeOut(el, duration, callback) {
  var start = null;
  function step(ts) {
    if (!start) start = ts;
    var progress = Math.min((ts - start) / duration, 1);
    el.style.opacity = String(1 - progress);
    el.style.filter = 'alpha(opacity=' + Math.round((1 - progress) * 100) + ')';
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      el.style.display = 'none';
      if (callback) callback();
    }
  }
  requestAnimationFrame(step);
}

// === Shared glossary data loader (DRY — used by overlay + ticker) ===
var _glossaryCallbacks = [];
var _glossaryData = null;

function onGlossaryReady(cb) {
  if (_glossaryData) { cb(_glossaryData); return; }
  _glossaryCallbacks.push(cb);
}

(function() {
  var basePath = window.location.pathname.replace(/\/kiosk\/?$/, '');
  var url = basePath + '/glosar-data/';
  var xhr = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status !== 200) { console.warn('Glossary fetch failed:', xhr.status, url); return; }
    try {
      // Extract JSON — response may be wrapped in HTML by Zola minifier
      var text = xhr.responseText;
      var start = text.indexOf('[');
      var end = text.lastIndexOf(']');
      if (start === -1 || end === -1) { console.warn('Glossary: no JSON array found'); return; }
      _glossaryData = JSON.parse(text.substring(start, end + 1));
      console.log('Glossary loaded:', _glossaryData.length, 'terms');
      for (var i = 0; i < _glossaryCallbacks.length; i++) {
        _glossaryCallbacks[i](_glossaryData);
      }
      _glossaryCallbacks = [];
    } catch (e) { console.warn('Glossary parse error:', e.message); }
  };
  xhr.send();
})();

// === Dynamic glossary overlay ===
// On by default. Disable with ?dynamic=false
// Params: ?interval=5 (minutes), ?duration=15 (seconds)
// Console: kiosk.showTerm(), kiosk.showTerm(3), kiosk.nextTerm()
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('dynamic') === 'false') return;

  var glossaryTerms = [];
  var overlay = document.getElementById('glossary-overlay');
  var elTitle = document.getElementById('gc-title');
  var elEn = document.getElementById('gc-en');
  var elDesc = document.getElementById('gc-desc');
  var elFunfact = document.getElementById('gc-funfact');
  var intervalMin = parseInt(params.get('interval'), 10) || 5;
  var durationSec = parseInt(params.get('duration'), 10) || 7;
  var INTERVAL = intervalMin * 60 * 1000;
  var DISPLAY = durationSec * 1000;
  var lastIdx = -1;
  var timer = null;
  var hideTimer = null;

  // Use shared glossary loader
  onGlossaryReady(function(terms) {
    glossaryTerms = terms;
    if (glossaryTerms.length > 0) {
      timer = setTimeout(showRandomTerm, INTERVAL);
    }
  });

  function showTerm(idx) {
    if (glossaryTerms.length === 0) return;
    if (typeof idx !== 'number') {
      idx = lastIdx;
      while (idx === lastIdx && glossaryTerms.length > 1) {
        idx = Math.floor(Math.random() * glossaryTerms.length);
      }
    }
    idx = Math.max(0, Math.min(idx, glossaryTerms.length - 1));
    lastIdx = idx;

    var term = glossaryTerms[idx];
    elTitle.textContent = term.title;
    elEn.textContent = term.en || '';
    elEn.style.display = term.en ? '' : 'none';
    elDesc.textContent = term.desc;
    elFunfact.textContent = term.funfact || '';
    elFunfact.style.display = term.funfact ? '' : 'none';

    // Calculate reading time from all visible text
    var allText = term.title + ' ' + (term.en || '') + ' ' + term.desc + ' ' + (term.funfact || '');
    var wordCount = allText.split(/\s+/).length;
    var readingMs = Math.max(DISPLAY, (wordCount / 5) * 1000 + 2000);
    readingMs = Math.round(readingMs * 1.2);

    if (timer) clearTimeout(timer);
    if (hideTimer) clearTimeout(hideTimer);
    fadeIn(overlay, 800, function() {
      hideTimer = setTimeout(function() {
        fadeOut(overlay, 800);
      }, readingMs);
    });
    timer = setTimeout(showRandomTerm, INTERVAL);

    return term.title + (term.en ? ' (' + term.en + ')' : '');
  }

  function hideTerm() {
    if (hideTimer) clearTimeout(hideTimer);
    fadeOut(overlay, 400);
    // Reset interval timer
    if (timer) clearTimeout(timer);
    timer = setTimeout(showRandomTerm, INTERVAL);
  }

  function showTermInstant(idx) {
    // No fade — instant swap for arrow key navigation
    if (glossaryTerms.length === 0) return;
    idx = Math.max(0, Math.min(idx, glossaryTerms.length - 1));
    lastIdx = idx;

    var term = glossaryTerms[idx];
    elTitle.textContent = term.title;
    elEn.textContent = term.en || '';
    elEn.style.display = term.en ? '' : 'none';
    elDesc.textContent = term.desc;
    elFunfact.textContent = term.funfact || '';
    elFunfact.style.display = term.funfact ? '' : 'none';

    // Show instantly
    overlay.style.display = 'block';
    overlay.style.opacity = '1';

    // Recalculate hide timer
    var allText = term.title + ' ' + (term.en || '') + ' ' + term.desc + ' ' + (term.funfact || '');
    var wordCount = allText.split(/\s+/).length;
    var readingMs = Math.max(DISPLAY, (wordCount / 5) * 1000 + 2000);
    readingMs = Math.round(readingMs * 1.2);

    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(function() {
      fadeOut(overlay, 800);
    }, readingMs);
    if (timer) clearTimeout(timer);
    timer = setTimeout(showRandomTerm, INTERVAL);
  }

  function showNextTerm() {
    var next = (lastIdx + 1) % glossaryTerms.length;
    showTermInstant(next);
  }

  function showPrevTerm() {
    var prev = lastIdx <= 0 ? glossaryTerms.length - 1 : lastIdx - 1;
    showTermInstant(prev);
  }

  function showRandomTerm() {
    showTerm();
  }

  // Keyboard: Escape=close, ArrowRight=next, ArrowLeft=prev
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' || e.keyCode === 27) {
      hideTerm();
    } else if (e.key === 'ArrowRight' || e.keyCode === 39) {
      showNextTerm();
    } else if (e.key === 'ArrowLeft' || e.keyCode === 37) {
      showPrevTerm();
    }
  });

  // Console API
  window.kiosk = {
    showTerm: function(idx) { return showTerm(idx); },
    nextTerm: function() { return showTerm(); },
    listTerms: function() {
      glossaryTerms.forEach(function(t, i) {
        console.log(i + ': ' + t.title + (t.en ? ' (' + t.en + ')' : ''));
      });
      return glossaryTerms.length + ' terms';
    },
    setInterval: function(min) {
      INTERVAL = min * 60 * 1000;
      return 'Interval: ' + min + ' min';
    },
    setDuration: function(sec) {
      DISPLAY = sec * 1000;
      return 'Duration: ' + sec + 's';
    },
    help: function() {
      console.log('kiosk.showTerm()     — show random term now');
      console.log('kiosk.showTerm(5)    — show term #5');
      console.log('kiosk.nextTerm()     — alias for showTerm()');
      console.log('kiosk.listTerms()    — list all terms');
      console.log('kiosk.setInterval(3) — set interval to 3 min');
      console.log('kiosk.setDuration(20)— set display to 20s');
      return 'Kiosk dynamic mode';
    }
  };
})();

(function() {

  var wisdoms = [];
  var wisdomIdx = 0;
  var WISDOM_INTERVAL = 45000;
  var WISDOM_DISPLAY = 8000;

  tickerEl.textContent = defaultText;

  // Use shared glossary loader (DRY — same data as overlay)
  onGlossaryReady(function(terms) {
    for (var i = 0; i < terms.length; i++) {
      if (terms[i].funfact) {
        wisdoms.push(terms[i].title + ': ' + terms[i].funfact);
      }
    }
    // Shuffle
    for (var j = wisdoms.length - 1; j > 0; j--) {
      var k = Math.floor(Math.random() * (j + 1));
      var tmp = wisdoms[j]; wisdoms[j] = wisdoms[k]; wisdoms[k] = tmp;
    }
    if (wisdoms.length > 0) {
      setTimeout(showWisdom, WISDOM_INTERVAL);
    }
  });

  function tickerFade(el, from, to, duration, cb) {
    var start = null;
    function step(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / duration, 1);
      el.style.opacity = String(from + (to - from) * p);
      if (p < 1) { requestAnimationFrame(step); }
      else { if (cb) cb(); }
    }
    requestAnimationFrame(step);
  }

  function marquee(el, text, cb) {
    var container = el.parentNode;
    var containerWidth = container.offsetWidth;

    // Set text and make visible offscreen to measure
    el.textContent = text;
    el.className = 'ticker-text ticker-wisdom';
    el.style.opacity = '1';
    el.style.width = 'auto';
    el.style.right = 'auto';
    el.style.left = containerWidth + 'px';

    // Force reflow then measure actual text width
    el.offsetHeight; // force reflow
    var textWidth = el.scrollWidth || el.offsetWidth;

    var startX = containerWidth;
    var endX = -textWidth - 50;
    var distance = startX - endX;
    var speed = 80;
    var duration = (distance / speed) * 1000;
    var start = null;

    function step(ts) {
      if (!start) start = ts;
      var p = Math.min((ts - start) / duration, 1);
      var x = startX + (endX - startX) * p;
      el.style.left = Math.round(x) + 'px';
      if (p < 1) { requestAnimationFrame(step); }
      else { if (cb) cb(); }
    }
    requestAnimationFrame(step);
  }

  function showWisdom() {
    if (wisdoms.length === 0) return;
    var text = wisdoms[wisdomIdx % wisdoms.length];
    wisdomIdx++;

    // 1. Fade out default text
    tickerFade(tickerEl, 1, 0, 1500, function() {
      // 2. Marquee scroll wisdom text
      marquee(tickerEl, text, function() {
        // 3. Pause 500ms after text exits left
        setTimeout(function() {
          // 4. Fade in default text
          resetToDefault(function() {
            setTimeout(showWisdom, WISDOM_INTERVAL);
          });
        }, 500);
      });
    });
  }

  function resetToDefault(cb) {
    tickerEl.style.left = '0';
    tickerEl.style.width = '';
    tickerEl.style.right = '0';
    tickerEl.textContent = defaultText;
    tickerEl.className = 'ticker-text';
    tickerEl.style.opacity = '0';
    tickerFade(tickerEl, 0, 1, 1500, cb);
  }

  function showWisdomText(text) {
    tickerFade(tickerEl, 1, 0, 1500, function() {
      marquee(tickerEl, text, function() {
        resetToDefault();
      });
    });
  }

  // === Self-promo: at :00, :15, :30, :45 or click on label ===
  var promos = [

    'Tomas Korcak \u2022 korczis@gmail.com \u2022 Architekt systemu, co nikdy nespi \u2014 vcetne pivni tabule',
    'linkedin.com/in/korcaktomas \u2022 korczis@gmail.com \u2022 Kdo postavi web pivnici? Ten, kdo ji taky navstevuje.',
    'korczis@gmail.com \u2022 linkedin.com/in/korcaktomas \u2022 401 pivnich pojmu, 6 piv na cepu, 1 frajer za kodem',
    'S laskou vyrobil Tomas Korcak \u2022 korczis@gmail.com \u2022 Digitalni pivo z Brna do sveta',
    'korczis@gmail.com \u2022 linkedin.com/in/korcaktomas \u2022 Zola + Alpine.js + Claude = tato tabule',
    'Tomas Korcak \u2022 korczis@gmail.com \u2022 Pivo je dobre, ale kod je lepsi. Nebo naopak?',
  ];
  var promoIdx = 0;

  function showPromo() {

  // Schedule at :00, :15, :30, :45
  function schedulePromo() {

    var sec = now.getSeconds();
    // Next quarter: 0, 15, 30, 45
