<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;

body {

}

<body>

<div id="announcement" class="announcement" style="display:none"></div>

<div class="table-wrap">
  <div id="loading" class="loading">Načítám nabídku...</div>
  <div id="beer-container"></div>
</div>


<script>
// ES5-only kiosk for old Smart TV browsers (JVC, Samsung, LG)
// No const/let, no arrow functions, no template literals, no async/await
// No Alpine.js, no modules, no classes - pure vanilla ES5

var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSeZjP4HadboLuS8v4KVobNqsKtjaBpBJ8oCuPCC-OjfkCtCWA8N_asuxkedh7QSGhsrXU0JU_bV_Rn/pub?gid=1804527038&single=true&output=csv';
var REFRESH_MS = 90000;

function esc(text) {
  if (!text) return '';
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function parseCSVLine(line) {
  var cells = [];
  var current = '';
  var inQuotes = false;
  var i, ch;
  for (i = 0; i < line.length; i++) {
    ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (i + 1 < line.length && line[i + 1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = false;
        }
      } else {
        current += ch;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
      } else if (ch === ',') {
        cells.push(current.trim());
        current = '';
      } else {
        current += ch;
      }
    }
  }
  cells.push(current.trim());
  return cells;
}

function normalizeKey(h) {
  var k = h.toLowerCase().trim();
  if (k.indexOf('pivovar') !== -1) return 'pivovar';
  if (k.indexOf('název') !== -1 || k.indexOf('name') !== -1) return 'nazev';
  if (k.indexOf('styl') !== -1 || k.indexOf('style') !== -1) return 'styl';
  if (k.indexOf('alk') !== -1 || k === '%') return 'abv';
  if (k.indexOf('ibu') !== -1) return 'ibu';
  if (k.indexOf('cena') !== -1 || k.indexOf('price') !== -1) return 'cena';
  return k;
}

function loadBeers() {
  var xhr = new XMLHttpRequest();
  xhr.open('GET', CSV_URL, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;

    if (xhr.status !== 200) {
      document.getElementById('loading').textContent = 'Nepodařilo se načíst nabídku.';
      // offline
      return;
    }

    var csv = xhr.responseText;
    var lines = csv.split('\n');
    var nonEmpty = [];
    var i;
    for (i = 0; i < lines.length; i++) {
      if (lines[i].trim()) nonEmpty.push(lines[i]);
    }

    if (nonEmpty.length === 0) return;

    // Announcement from row 1, columns C-F
    var firstRow = parseCSVLine(nonEmpty[0]);
    var ann = [];
    var a;
    for (a = 2; a <= 5; a++) {
      if (firstRow[a]) ann.push(firstRow[a]);
    }
    var announcement = ann.join(' ');

    var annEl = document.getElementById('announcement');
    if (announcement) {
      annEl.textContent = announcement;
      annEl.style.display = '';
    } else {
      annEl.style.display = 'none';
    }

    // Find header row
    var headerIdx = -1;
    var h;
    for (h = 0; h < nonEmpty.length; h++) {
      var lower = nonEmpty[h].toLowerCase();
      if (lower.indexOf('pivo') !== -1 || lower.indexOf('pivovar') !== -1 || lower.indexOf('název') !== -1) {
        headerIdx = h;
        break;
      }
    }

    if (headerIdx < 0) {
      document.getElementById('loading').textContent = 'Žádná piva na čepu.';
      return;
    }

    var rawHeaders = parseCSVLine(nonEmpty[headerIdx]);
    var headers = [];
    var hi;
    for (hi = 0; hi < rawHeaders.length; hi++) {
      headers.push(normalizeKey(rawHeaders[hi]));
    }

    // Parse beers (deduplicate by brewery+name)
    var beers = [];
    var seen = {};
    var bi, cells, brewery, name, breweryIdx, nameIdx, ci, key, beer, ki;
    for (bi = headerIdx + 1; bi < nonEmpty.length && beers.length < 12; bi++) {
      cells = parseCSVLine(nonEmpty[bi]);
      breweryIdx = -1;
      nameIdx = -1;
      for (ci = 0; ci < headers.length; ci++) {
        if (headers[ci] === 'pivovar') breweryIdx = ci;
        if (headers[ci] === 'nazev') nameIdx = ci;
      }
      brewery = breweryIdx >= 0 ? (cells[breweryIdx] || '').trim() : '';
      name = nameIdx >= 0 ? (cells[nameIdx] || '').trim() : '';
      if (!brewery && !name) continue;

      key = brewery.toLowerCase() + '|' + name.toLowerCase();
      if (seen[key]) continue;
      seen[key] = true;

      beer = {};
      for (ki = 0; ki < headers.length; ki++) {
        if (headers[ki]) beer[headers[ki]] = (cells[ki] || '').trim();
      }
      beers.push(beer);
    }

    // Build table using DOM (no innerHTML with untrusted content)
    var container = document.getElementById('beer-container');
    var oldTable = document.getElementById('beer-table');
    if (oldTable) container.removeChild(oldTable);

    var table = document.createElement('table');
    table.id = 'beer-table';

    // Column widths for even distribution
    var colgroup = document.createElement('colgroup');
    var colClasses = ['col-num', 'col-name', 'col-brewery', 'col-style', 'col-abv', 'col-price'];
    var ci2;
    for (ci2 = 0; ci2 < colClasses.length; ci2++) {
      var col = document.createElement('col');
      col.className = colClasses[ci2];
      colgroup.appendChild(col);
    }
    table.appendChild(colgroup);

    var thead = document.createElement('thead');
    var headerRow = document.createElement('tr');
    var thNames = ['#', 'Pivo', 'Pivovar', 'Styl', 'Alk.', 'Cena'];
    var ti;
    for (ti = 0; ti < thNames.length; ti++) {
      var th = document.createElement('th');
      th.textContent = thNames[ti];
      headerRow.appendChild(th);
    }
    thead.appendChild(headerRow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');
    var ri, b, tr, tdName, tdBrewery, tdStyle, tdAbv, tdPrice;
    for (ri = 0; ri < beers.length; ri++) {
      b = beers[ri];
      tr = document.createElement('tr');

      var tdNum = document.createElement('td');
      tdNum.className = 'td-num';
      tdNum.textContent = (ri + 1) + '.';
      tr.appendChild(tdNum);

      tdName = document.createElement('td');
      tdName.className = 'td-name';
      tdName.textContent = b.nazev || '';
      tr.appendChild(tdName);

      tdBrewery = document.createElement('td');
      tdBrewery.className = 'td-brewery';
      tdBrewery.textContent = b.pivovar || '';
      tr.appendChild(tdBrewery);

      tdStyle = document.createElement('td');
      tdStyle.className = 'td-style';
      tdStyle.textContent = b.styl || '';
      tr.appendChild(tdStyle);

      tdAbv = document.createElement('td');
      tdAbv.className = 'td-abv';
      tdAbv.textContent = b.abv || '';
      tr.appendChild(tdAbv);

      tdPrice = document.createElement('td');
      tdPrice.className = 'td-price';
      if (b.cena && b.cena.indexOf('/') !== -1) {
        // Split "57 / 37" into big price + smaller small price
        var priceParts = b.cena.split('/');
        var bigSpan = document.createElement('span');
        bigSpan.textContent = priceParts[0].trim();
        var sep = document.createElement('span');
        sep.className = 'price-sep';
        sep.textContent = ' / ';
        var smallSpan = document.createElement('span');
        smallSpan.className = 'price-small';
        smallSpan.textContent = priceParts[1].trim();
        var unit = document.createElement('span');
        unit.className = 'price-unit';
        unit.textContent = ' Kč';
        tdPrice.appendChild(bigSpan);
        tdPrice.appendChild(sep);
        tdPrice.appendChild(smallSpan);
        tdPrice.appendChild(unit);
      } else if (b.cena) {
        tdPrice.textContent = b.cena + ' Kč';
      }
      tr.appendChild(tdPrice);

      tbody.appendChild(tr);
    }
    table.appendChild(tbody);

    container.appendChild(table);
    document.getElementById('loading').style.display = 'none';
    // loaded

    // Fit rows to fill entire screen height
    fitToScreen(beers.length);
  };
  xhr.send();
}

function fitToScreen(beerCount) {
  // Calculate available height for table body
  var announcement = document.getElementById('announcement');
  var thead = document.querySelector('thead');
  var tableWrap = document.querySelector('.table-wrap');

  var usedHeight = 0;
  if (announcement && announcement.style.display !== 'none') usedHeight += announcement.offsetHeight;
  if (thead) usedHeight += thead.offsetHeight;

  // Use exact available height, no rounding down (prevents last row cutoff)
  var availableHeight = window.innerHeight - usedHeight - 4; // 4px safety margin
  if (beerCount > 0 && availableHeight > 0) {
    var rowHeight = availableHeight / beerCount;
    var rows = document.querySelectorAll('tbody tr');
    var i;
    for (i = 0; i < rows.length; i++) {
      rows[i].style.height = Math.floor(rowHeight) + 'px';
      rows[i].style.maxHeight = Math.floor(rowHeight) + 'px';
      rows[i].style.overflow = 'hidden';
    }

    // Set table-wrap to exact remaining height
    if (tableWrap) {
      tableWrap.style.height = (availableHeight + thead.offsetHeight) + 'px';
      tableWrap.style.maxHeight = tableWrap.style.height;
      tableWrap.style.overflow = 'hidden';
    }

    // Scale ALL font sizes based on row height
    var nameSize = Math.min(Math.max(rowHeight * 0.38, 18), 56);
    var brewerySize = Math.min(Math.max(rowHeight * 0.30, 16), 44);
    var styleSize = Math.min(Math.max(rowHeight * 0.25, 14), 36);
    var abvSize = Math.min(Math.max(rowHeight * 0.28, 14), 38);
    var priceSize = nameSize;
    var numSize = Math.min(Math.max(rowHeight * 0.28, 14), 38);

    var setSize = function(selector, size) {
      var els = document.querySelectorAll(selector);
      for (var j = 0; j < els.length; j++) {
        els[j].style.fontSize = size + 'px';
      }
    };

    setSize('.td-num', numSize);
    setSize('.td-name', nameSize);
    setSize('.td-brewery', brewerySize);
    setSize('.td-style', styleSize);
    setSize('.td-abv', abvSize);
    setSize('.td-price', priceSize);

    // Scale header too
    var ths = document.querySelectorAll('thead th');
    var thSize = Math.min(Math.max(rowHeight * 0.15, 10), 20);
    for (i = 0; i < ths.length; i++) {
      ths[i].style.fontSize = thSize + 'px';
    }
  }
}

// Initial load
loadBeers();

// Auto-refresh every 90 seconds
setInterval(loadBeers, REFRESH_MS);

// Refit on resize (orientation change, etc.)
window.onresize = function() {
  var rows = document.querySelectorAll('tbody tr');
  if (rows.length > 0) fitToScreen(rows.length);
};
</script>
